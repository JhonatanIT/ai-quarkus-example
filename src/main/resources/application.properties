# --- Azure Routing ---
quarkus.azure-functions.app-name=ai-quarkus-bot-br
quarkus.azure-functions.resource-group=quarkus-bot-rg-brazil
quarkus.azure-functions.region=brazilsouth
quarkus.http.root-path=/api

# --- Gemini Chat Model ---
quarkus.langchain4j.timeout=60s
quarkus.langchain4j.ai.gemini.chat-model.temperature=0.7
quarkus.langchain4j.ai.gemini.chat-model.model-id=gemini-2.5-flash
quarkus.langchain4j.ai.gemini.api-key=
quarkus.langchain4j.ai.gemini.log-requests=true
quarkus.langchain4j.ai.gemini.log-responses=true

# --- Gemini Embedding Model (For RAG) ---
quarkus.langchain4j.ai.gemini.embedding-model.enabled=true
quarkus.langchain4j.ai.gemini.embedding-model.model-id=gemini-embedding-001

# --- Easy RAG Configuration ---
# 1. Provide just the folder name
quarkus.langchain4j.easy-rag.path=catalog
# 2. Tell Quarkus to look for this folder inside the classpath (src/main/resources)
quarkus.langchain4j.easy-rag.path-type=CLASSPATH
quarkus.langchain4j.easy-rag.max-segment-size=500
quarkus.langchain4j.easy-rag.max-overlap-size=50
